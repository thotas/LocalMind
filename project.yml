name: LocalMind
options:
  bundleIdPrefix: com.localmind
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.19"

targets:
  LocalMind:
    type: application
    platform: macOS
    sources:
      - path: LocalMind
    settings:
      base:
        INFOPLIST_FILE: LocalMind/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.localmind.app
        PRODUCT_NAME: LocalMind
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_ENTITLEMENTS: LocalMind/Resources/LocalMind.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: GRDB
      - package: ZIPFoundation
    entitlements:
      path: LocalMind/Resources/LocalMind.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
